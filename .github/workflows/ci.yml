name: Agent Guard CI

on:
  push:
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Run deterministic Harness eval
        run: python scripts/run_eval_suite.py --iterations 200
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: harness-eval
          path: reports/harness_eval.json
